<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/ab30926346.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="card col-9 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4>Payment form example</h4>
            </div>
            <div class="card-body">
                <div class="col">
                    <p class="text-start bg-danger-subtle text-danger px-2 py-2">Some fields are missing.</p>
                </div>
                <form class="d-flex justify-content-between">
                    <div class=" mb-3 col-4 p-1">
                        <label for="exampleInputEmail1" class="form-label">Card #</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" placeholder="XXXXXXXXXXXXXX">
                    </div>
                    <div class="mb-3 col-4 p-1">
                        <label for="password" class="form-label">CVV</label>
                        <input type="password" class="form-control" id="password" placeholder="0000">
                    </div>
                    <div class="mb-3 col-4 p-1">
                        <label for="amount" class="form-label">Amount</label>
                        <div class="d-flex flex-row">
                            <span class=""><strong>$</strong></span>
                            <input type="email" class="form-control" id="amount" placeholder="Amount">
                        </div>
                    </div>
                </form>
                <div class="d-flex">
                    <div class="flex-fill col-4">
                        <form>
                            <div class="mb-3">
                                <label for="firstname" class="form-label">First name</label>
                                <input type="email" class="form-control" id="firstname" aria-describedby="emailHelp">
                            </div>
                            <div class="mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="email" class="form-control" id="city" aria-describedby="emailHelp">
                            </div>
                        </form>
                        We accept:
                        <form class="d-flex flex-row bg-secondary text-white py-1 px-1 my-1 col-6 p-1 rounded">
                            <div class="ms-2 p-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                                    <label class="form-check-label" for="radioDefault1">
                                        <i class="fa-brands fa-cc-mastercard fs-6"></i>
                                    </label>
                                </div>
                            </div>
                            <div class="ms-3 p-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                                    <label class="form-check-label" for="radioDefault1">
                                        <i class="fa-brands fa-cc-visa"></i>
                                    </label>
                                </div>
                            </div>
                            <div class="ms-3 p-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                                    <label class="form-check-label" for="radioDefault1">
                                        <i class="fa-brands fa-cc-diners-club"></i>
                                    </label>
                                </div>
                            </div>
                            <div class="ms-3 p-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                                    <label class="form-check-label" for="radioDefault1">
                                        <i class="fa-brands fa-cc-amex"></i>
                                    </label>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class=" ms-3 flex-fill col-5">
                        <div class="mb-3">
                            <label for="lastname" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastname">
                        </div>
                        <div class="d-flex">
                            <div class="mb-3 w-50">
                                <label for="state" class="form-label">State</label>
                                <select class="form-select" aria-label="Default select example" id="state">
                                    <option selected>Pick a state</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                </select>
                            </div>
                            <div class="ms-3 w-50">
                                <label for="postalcode" class="form-label">Postal Code</label>
                                <input type="text" class="form-control" id="postalcode">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="exampleFormControlTextarea1" class="form-label">Message</label>
                            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                            <div id="passwordHelpBlock" class="form-text">
                                Add any notes here.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-footer text-body-secondary">
            <div class="d-flex flex-row justify-content-end">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button type="button" class="btn btn-primary ms-1">Send</button>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
